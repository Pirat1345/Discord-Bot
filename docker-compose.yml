services:
  discord-bot:
    build: .
    container_name: discord-bot-panel
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - API_PORT=3001
      - SESSION_SECRET=${SESSION_SECRET}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-http://localhost:3001}
    volumes:
      - bot-data:/app/server/data

volumes:
  bot-data:
